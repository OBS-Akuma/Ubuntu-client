<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ubuntu Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
</head>
<body>
    <div id="nameless-menu-overlay" style="display: block;">
        <div class="nameless-menu">

            
            <div class="menu-header">
                <i class="fas fa-sliders-h"></i> client settings
                <button class="menu-close" style="margin-left:auto;background:none;border:none;color:#666;cursor:pointer;font-size:0.7rem;padding:2px 6px;border-radius:4px;">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            
            <div class="setting-item">
                <span class="setting-label"><i class="fas fa-palette"></i> Theme</span>
                <select class="setting-select" id="client-theme-select">
                    <option value="nameless" selected>Nameless</option>
                    <option value="celeste">Celeste</option>
                </select>
            </div>

            
            <div class="setting-item">
                <span class="setting-label"><i class="fas fa-crosshairs"></i> Hitmarker</span>
                <input type="text" class="setting-input" id="input-hitmarker" placeholder="https://.../.png" />
            </div>

            
            <div class="setting-item">
                <span class="setting-label"><i class="fas fa-skull"></i> Kill Icon</span>
                <input type="text" class="setting-input" id="input-killicon" placeholder="https://.../.png" />
            </div>

            
            <div class="setting-item">
                <span class="setting-label"><i class="fas fa-code"></i> Custom CSS</span>
                <input type="text" class="setting-input" id="input-custom-css" placeholder="https://.../.css" />
            </div>

            
            <div class="menu-divider"></div>

            
            <div class="setting-item" style="border-bottom: none; padding-bottom: 0.1rem;">
                <span class="setting-label"><i class="fas fa-search-plus"></i> Zoom</span>
                <div class="zoom-group">
                    <span class="zoom-btn" id="zoom-out"><i class="fas fa-minus"></i></span>
                    <span class="zoom-value" id="zoom-display">100%</span>
                    <span class="zoom-btn" id="zoom-in"><i class="fas fa-plus"></i></span>
                    <span class="zoom-btn" id="zoom-reset" style="font-size:0.5rem; padding:0.15rem 0.4rem;"><i class="fas fa-undo"></i></span>
                </div>
            </div>

            
            <div style="font-size:0.5rem; color:#222; text-align:center; padding-top:0.4rem; letter-spacing:0.03em;">
                ubuntu client
            </div>

        </div>
    </div>
</body>
</html>
